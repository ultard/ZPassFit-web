    post:
      tags:
        - AI
      summary: Рассчитать вероятность оттока
      description: Собирает данные клиента из БД, вызывает gRPC PredictionService и
        возвращает вероятность оттока.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChurnPredictionRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/ChurnPredictionRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ChurnPredictionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ChurnPredictionResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ChurnPredictionResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ChurnPredictionResponse"
        "404":
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "502":
          description: Bad Gateway
components:
  schemas:
    AdminSetMembershipRequest:
      required:
        - clientId
        - planId
        - durationDays
      type: object
      properties:
        clientId:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        durationDays:
          maximum: 3650
          minimum: 1
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
    AuditLogResponse:
      required:
        - id
        - occurredAtUtc
        - userId
        - userEmail
        - action
        - entityType
        - entityId
        - details
        - ipAddress
      type: object
      properties:
        id:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int64
        occurredAtUtc:
          type: string
          format: date-time
        userId:
          type:
            - "null"
            - string
        userEmail:
          type:
            - "null"
            - string
        action:
          type: string
        entityType:
          type: string
        entityId:
          type:
            - "null"
            - string
        details:
          type:
            - "null"
            - string
        ipAddress:
          type:
            - "null"
            - string
    AuthResponse:
      required:
        - accessToken
        - refreshToken
        - accessTokenExpiresAtUtc
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpiresAtUtc:
          type: string
          format: date-time
    BonusTransactionListItemResponse:
      required:
        - id
        - type
        - createDate
        - expireDate
        - clientId
        - clientLastName
        - clientFirstName
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/BonusTransactionType"
        createDate:
          type: string
          format: date-time
        expireDate:
          type:
            - "null"
            - string
          format: date-time
        clientId:
          type: string
          format: uuid
        clientLastName:
          type: string
        clientFirstName:
          type: string
    BonusTransactionType:
      type: integer
    BuyMembershipRequest:
      required:
        - planId
        - durationDays
        - method
      type: object
      properties:
        planId:
          type: string
          format: uuid
        durationDays:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        method:
          $ref: "#/components/schemas/PaymentMethod"
    ChurnPredictionRequest:
      required:
        - clientId
      type: object
      properties:
        clientId:
          type: string
          format: uuid
    ChurnPredictionResponse:
      required:
        - prediction
        - probability
      type: object
      properties:
        prediction:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        probability:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?$
          type:
            - number
            - string
          format: double
    ClientGender:
      type: integer
    ClientListItemResponse:
      required:
        - id
        - lastName
        - firstName
        - middleName
        - phone
        - email
        - status
        - registrationDate
      type: object
      properties:
        id:
          type: string
          format: uuid
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        phone:
          type: string
        email:
          type: string
        status:
          $ref: "#/components/schemas/ClientStatus"
        registrationDate:
          type: string
          format: date-time
    ClientResponse:
      required:
        - id
        - lastName
        - firstName
        - middleName
        - birthDate
        - gender
        - phone
        - email
        - registrationDate
        - status
        - bonuses
        - balance
        - notes
      type: object
      properties:
        id:
          type: string
          format: uuid
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        birthDate:
          type: string
          format: date-time
        gender:
          $ref: "#/components/schemas/ClientGender"
        phone:
          type: string
        email:
          type: string
        registrationDate:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ClientStatus"
        bonuses:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        balance:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        notes:
          type:
            - "null"
            - string
    CreditClientBalanceRequest:
      required:
        - amount
      type: object
      properties:
        amount:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
    ClientStatus:
      type: integer
    CreateLevelRequest:
      required:
        - name
        - activateDays
        - graceDays
        - previousLevelId
      type: object
      properties:
        name:
          maxLength: 20
