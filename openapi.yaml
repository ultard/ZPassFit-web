openapi: 3.1.1
info:
  title: ZPassFit | v1
  version: 1.0.0
servers:
  - url: http://localhost:5096/
paths:
  /attendance/visits:
    get:
      tags:
        - Посещения
      summary: Текущее посещение
      description: Возвращает открытое (не завершённое) посещение текущего клиента,
        если оно есть.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /attendance/visits/history:
    get:
      tags:
        - Посещения
      summary: История посещений
      description: Возвращает историю посещений текущего клиента (от новых к старым).
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisitLogResponse"
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisitLogResponse"
            text/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisitLogResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /attendance/qr_session:
    post:
      tags:
        - Посещения
      summary: Создать QR-сессию
      description: Создаёт краткоживущую QR-сессию для входа клиента в клуб.
        Возвращает токен и время истечения.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/QrSessionResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/QrSessionResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/QrSessionResponse"
        "400":
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /attendance/checkin/{token}:
    post:
      tags:
        - Посещения
      summary: Вход по QR
      description: Открывает посещение по QR-токену (обычно сканируется на ресепшене).
        При успехе удаляет QR-сессию.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
        "400":
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /attendance/checkout:
    post:
      tags:
        - Посещения
      summary: Выход
      description: Закрывает текущее посещение клиента, проставляя время выхода.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/VisitLogResponse"
        "400":
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /audit:
    get:
      tags:
        - Аудит
      summary: Журнал аудита
      description: "Список записей аудита. Фильтры: интервал по UTC, подстрока в
        Action и EntityType."
      parameters:
        - name: fromUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: toUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: action
          in: query
          schema:
            type: string
        - name: entityType
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
            default: 1
        - name: pageSize
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
            default: 20
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/PagedAuditLogsResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/PagedAuditLogsResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/PagedAuditLogsResponse"
        "400":
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /audit/{id}:
    get:
      tags:
        - Аудит
      summary: Запись аудита по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /auth/register:
    post:
      tags:
        - Авторизация
      summary: Регистрация
      description: Создаёт нового пользователя (клиента). Требуется подтверждение
        администратором.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          description: Регистрация прошла успешно
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Не удалось зарегистрироватся
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /auth/login:
    post:
      tags:
        - Авторизация
      summary: Вход
      description: Проверяет учётные данные.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: Вход выполнен успешно
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/AuthResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Неверная почта или пароль
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Аккаунт не подтверждён или заблокирован
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /auth/refresh:
    post:
      tags:
        - Авторизация
      summary: Обновление токенов
      description: По действительному токену выдаёт новую пару.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/AuthResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /auth/logout:
    post:
      tags:
        - Авторизация
      summary: Выход
      description: Отзывает refresh-токены.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: "null"
                - $ref: "#/components/schemas/LogoutRequest"
          text/json:
            schema:
              oneOf:
                - type: "null"
                - $ref: "#/components/schemas/LogoutRequest"
          application/*+json:
            schema:
              oneOf:
                - type: "null"
                - $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Выход выполнен
  /client/profile:
    get:
      tags:
        - Клиенты
      summary: Профиль клиента
      description: Возвращает профиль клиента текущего пользователя.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ClientResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      tags:
        - Клиенты
      summary: Обновить профиль
      description: Изменяет ФИО, дату рождения и пол текущего клиента.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientProfileRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/UpdateClientProfileRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/UpdateClientProfileRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ClientResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "400":
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /client/level:
    get:
      tags:
        - Клиенты
      summary: Мой уровень лояльности
      description: Возвращает активный уровень текущего пользователя, следующий
        уровень в цепочке и сколько посещений осталось до следующего уровня.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/MyClientLevelResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/MyClientLevelResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/MyClientLevelResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /client/membership:
    get:
      tags:
        - Клиенты
      summary: Мой абонемент
      description: Возвращает текущий абонемент текущего пользователя.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/MembershipResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/MembershipResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /client/payments:
    get:
      tags:
        - Клиенты
      summary: Мои платежи
      description: Возвращает историю платежей текущего пользователя.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentResponse"
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentResponse"
            text/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /dashboard/bonuses:
    get:
      tags:
        - Дашборд — бонусы
      summary: Список транзакций бонусов
      parameters:
        - name: fromUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: toUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: clientId
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/BonusTransactionType"
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
            default: 1
        - name: pageSize
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
            default: 20
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/PagedBonusTransactionsResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/PagedBonusTransactionsResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/PagedBonusTransactionsResponse"
        "400":
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /dashboard/bonuses/{id}:
    get:
      tags:
        - Дашборд — бонусы
      summary: Транзакция бонусов по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/BonusTransactionListItemResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/BonusTransactionListItemResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/BonusTransactionListItemResponse"
        "401":
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /dashboard/clients:
    get:
      tags:
        - Дашборд — клиенты
      summary: Список клиентов
      description: Постраничный список клиентов с поиском по ФИО, телефону и email.
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
            default: 1
        - name: pageSize
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
            default: 20
      responses:
        "200":
          description: OK
